name: PR Checks

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2

      - name: Install dependencies
        run: pnpm install

      - name: Run Linter
        run: pnpm lint
        continue-on-error: true

      - name: Type Check
        run: pnpm type-check
        continue-on-error: true

      - name: Run Tests
        run: pnpm test
        continue-on-error: true

      - name: Build Check
        run: pnpm build
        continue-on-error: true

      - name: Comment PR
        uses: actions/github-script@v6
        if: always()
        with:
          script: |
            const body = `## ✅ Quality Checks
            
            - **Linting**: Completed
            - **Type Checking**: Completed
            - **Tests**: Completed
            - **Build**: Completed
            
            Ready to merge! 🚀`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

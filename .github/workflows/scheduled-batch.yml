name: Scheduled Batch Ingestion

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger API batch pipeline
        env:
          CRON_API_URL: ${{ secrets.CRON_API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        run: |
          if [ -z "$CRON_API_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_API_URL or CRON_SECRET secrets"
            exit 1
          fi

          call_batch_endpoint() {
            local endpoint_url="$1"

            if [ -n "$VERCEL_BYPASS_TOKEN" ]; then
              endpoint_url="$endpoint_url?x-vercel-set-bypass-cookie=true&x-vercel-protection-bypass=$VERCEL_BYPASS_TOKEN"
            fi

            curl_args=(
              -sS
              -L
              -X POST
              "$endpoint_url"
              -H "Content-Type: application/json"
              -H "x-cron-secret: $CRON_SECRET"
              -d '{"sources":["reddit","hackernews","rss"],"limitPerSource":25,"hoursBack":24,"maxTrends":15,"minMentions":4}'
            )

            if [ -n "$VERCEL_BYPASS_TOKEN" ]; then
              curl_args+=(
                -H "x-vercel-protection-bypass: $VERCEL_BYPASS_TOKEN"
                -H "Cookie: x-vercel-protection-bypass=$VERCEL_BYPASS_TOKEN"
              )
            fi

            response=$(curl "${curl_args[@]}" -w '\nHTTP_STATUS:%{http_code}')
            status=$(echo "$response" | sed -n 's/^HTTP_STATUS://p')
            body=$(echo "$response" | sed '/^HTTP_STATUS:/d')

            echo "$body"

            if [ -z "$status" ] || [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
              echo "Endpoint call failed with HTTP $status"
              return 1
            fi

            echo "$body" | grep -q '"success":true' || {
              echo "Endpoint call did not return success=true"
              return 1
            }

            return 0
          }

          direct_url="$CRON_API_URL/api/internal/cron/run-all"
          proxy_url="$CRON_API_URL/api/proxy/api/internal/cron/run-all"

          echo "Calling scheduled batch endpoint (direct API URL)..."
          if call_batch_endpoint "$direct_url"; then
            exit 0
          fi

          echo "Direct call failed. Retrying through frontend proxy URL..."
          if call_batch_endpoint "$proxy_url"; then
            exit 0
          fi

          echo "Batch trigger failed for both direct and proxy endpoint paths"
          exit 1

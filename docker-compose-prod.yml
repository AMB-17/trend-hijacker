version: '3.8'

services:
  # PostgreSQL Database (Free, open-source)
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: trend-hijacker-db
    environment:
      POSTGRES_USER: ${DB_USER:-trendhijacker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trendhijacker123secure}
      POSTGRES_DB: ${DB_NAME:-trend_hijacker}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trendhijacker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis Cache (Free, open-source)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: trend-hijacker-cache
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # API Server (Node.js + Fastify)
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    container_name: trend-hijacker-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-trendhijacker}:${DB_PASSWORD:-trendhijacker123secure}@postgres:5432/${DB_NAME:-trend_hijacker}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-secure-jwt-secret-minimum-32-chars-long12345}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: http://localhost:3000,http://web:3000
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web Frontend (Next.js)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    container_name: trend-hijacker-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web/.next:/app/.next
      - ./apps/web/src:/app/src
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Scraper Worker (Background Jobs)
  scraper:
    build:
      context: .
      dockerfile: workers/scraper/Dockerfile
    restart: unless-stopped
    container_name: trend-hijacker-scraper
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-trendhijacker}:${DB_PASSWORD:-trendhijacker123secure}@postgres:5432/${DB_NAME:-trend_hijacker}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SCRAPE_INTERVAL: ${SCRAPE_INTERVAL:-3600}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Trend Analysis Engine (Background Jobs)
  trend-engine:
    build:
      context: .
      dockerfile: workers/trend-engine/Dockerfile
    restart: unless-stopped
    container_name: trend-hijacker-engine
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-trendhijacker}:${DB_PASSWORD:-trendhijacker123secure}@postgres:5432/${DB_NAME:-trend_hijacker}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ANALYSIS_INTERVAL: ${ANALYSIS_INTERVAL:-1800}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge
